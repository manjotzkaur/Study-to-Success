<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Student Login</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="css/login.css">
<link rel="stylesheet" href="css/theme.css">

<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>

<body id="body">

<div class="main-container">

  <!-- LEFT SIDE -->
  <div class="left-panel">
    <h1>Welcome Back 👋</h1>
    <p>
      Continue your journey towards academic success.  
      Plan smarter, study better, and achieve more.
    </p>

    <!-- IMAGE -->
    <img src="login.png" alt="Login Illustration" class="login-image">
  </div>

  <!-- RIGHT SIDE -->
  <div class="right-panel">

    <div class="login-card">

      <h2>Login</h2>
      <p>Access your study planner</p>

      <form id="loginForm" autocomplete="off">
        <!-- Hidden dummy fields to prevent autofill -->
        <input type="text" name="fakeusernameremembered" style="display:none">
        <input type="password" name="fakepasswordremembered" style="display:none">

        <input type="email" id="email" placeholder="Email" autocomplete="off" required>

        <div class="input-group">
          <input type="password" id="password" placeholder="Password" autocomplete="new-password" required>
          <i class="bi bi-eye toggle-password" id="togglePassword"></i>
        </div>

        <button type="submit" id="loginBtn">Login</button>
      </form>

      <div class="links">
        Don't have an account?
        <a href="signup.html">Sign Up</a>
      </div>

    </div>

  </div>

</div>

<script>
const form = document.getElementById("loginForm");
const btn = document.getElementById("loginBtn");

/* LOGIN */
form.addEventListener("submit", async function(e){
  e.preventDefault();

  const email = document.getElementById("email").value.trim();
  const userPassword = document.getElementById("password").value.trim();

  if(!email || !userPassword){
    alert("Please fill all fields");
    return;
  }

  btn.innerText = "Logging in...";
  btn.disabled = true;

  try{
    const response = await fetch("/login",{
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      credentials: "include",
      body: JSON.stringify({ email, password: userPassword })
    });

    const result = await response.json();

    if(result.success){
      window.location.href="/dashboard.html";
    } else {
      alert(result.message || "Invalid email or password");
    }

  } catch(error){
    alert("Server error. Try again.");
  }

  btn.innerText = "Login";
  btn.disabled = false;
});

/* SHOW PASSWORD */
const toggle = document.getElementById("togglePassword");
const passwordField = document.getElementById("password");

toggle.addEventListener("click", ()=>{
  if(passwordField.type === "password"){
    passwordField.type = "text";
    toggle.classList.replace("bi-eye","bi-eye-slash");
  } else {
    passwordField.type = "password";
    toggle.classList.replace("bi-eye-slash","bi-eye");
  }
});

/* DARK MODE */
if(localStorage.getItem("darkMode")==="true"){
  document.body.classList.add("dark-mode");
}
</script>

</body>
</html>
