<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Settings | Study to Success</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="css/theme.css">
  <!-- Custom CSS -->
  <link rel="stylesheet" href="css/settings.css">
</head>

<body id="body">

<div class="container-fluid">
  <div class="row min-vh-100">

    <!-- SIDEBAR -->
    <aside class="col-md-3 col-lg-2 sidebar p-4">
      <h4>Study to Success</h4>
      <p class="small">Smart Study Planner</p>

      <ul class="nav flex-column mt-4">
        <li class="nav-item"><a class="nav-link" href="dashboard.html">Dashboard</a></li>
        <li class="nav-item"><a class="nav-link" href="task.html">Tasks</a></li>
      
        <li class="nav-item"><a class="nav-link" href="analytics.html">Analytics</a></li>
        <li class="nav-item"><a class="nav-link active" href="settings.html">Settings</a></li>
      </ul>
    </aside>

    <!-- MAIN CONTENT -->
    <main class="col-md-9 col-lg-10 p-5 bg-light">

      <h2 class="mb-2">Settings</h2>
      <p class="text-muted mb-4">Manage your profile and application preferences.</p>

      <div class="row">

        <!-- PROFILE SETTINGS -->
        <div class="col-lg-6 mb-4">
          <div class="card shadow-sm">
            <div class="card-body">
              <h5 class="mb-3">Profile Settings</h5>

              <form id="profileForm">
                <div class="mb-3">
                  <label class="form-label">Student Name</label>
                  <input type="text" id="studentName" class="form-control">
                </div>

                <div class="mb-3">
                  <label class="form-label">Email</label>
                  <input type="email" id="studentEmail" class="form-control">
                </div>

                <button class="btn btn-primary">Save Profile</button>
              </form>
            </div>
          </div>
        </div>

        <!-- APP SETTINGS -->
        <div class="col-lg-6 mb-4">
          <div class="card shadow-sm">
            <div class="card-body">
              <h5 class="mb-3">Application Settings</h5>

              

              <div class="form-check form-switch mb-3">
                <input class="form-check-input" type="checkbox" id="darkMode">
                <label class="form-check-label">Dark Mode (Demo)</label>
              </div>

              <button class="btn btn-success" onclick="saveAppSettings()">Save Preferences</button>
            </div>
          </div>
        </div>

      </div>

      <!-- LOGOUT -->
      <div class="mt-4">
        <button class="btn btn-danger" onclick="logout()">Logout</button>
      </div>

    </main>

  </div>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<!-- Custom JS -->
<script src="js/settings.js"></script>
</body>
</html>
