<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Upcoming Exams | Study to Success</title>

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<!-- Custom CSS -->
<link rel="stylesheet" href="css/exams.css">
<link rel="stylesheet" href="css/theme.css">

</head>


<body id="body">

<div class="app-wrapper">

<!-- SIDEBAR -->
<aside class="sidebar">

<h4 class="brand">Study to Success</h4>
<p class="subtitle">Smart Study Planner</p>

<a href="dashboard.html">Dashboard</a>
<a class="active" href="#">Upcoming Exams</a>
<a href="calender.html">Calendar</a>

<!-- PROFILE -->
<div class="profile" id="profileBox" style="cursor:pointer;">
<strong id="studentName">Loading...</strong>
<small>View Profile</small>
</div>

</aside>


<!-- MAIN CONTENT -->
<main class="content">

<!-- HEADER -->
<div class="d-flex justify-content-between align-items-center mb-4">

<div>
<h2>Upcoming Exams</h2>
<p class="text-muted">Track your examination schedule</p>
</div>

<button class="btn btn-primary" id="addExamBtn">
+ Add New Exam
</button>

</div>


<!-- EXAMS GRID -->
<div class="row g-4" id="examGrid">

<!-- Exams will load here -->

</div>

</main>

</div>



<!-- ADD EXAM MODAL -->
<div class="modal fade" id="examModal">

<div class="modal-dialog">

<div class="modal-content p-4">

<h5 class="mb-3">Add New Exam</h5>

<input id="examTitle" class="form-control mb-2" placeholder="Subject Name">

<input id="examDate" type="date" class="form-control mb-2">

<input id="examTime" type="time" class="form-control mb-2">

<input id="examLocation" class="form-control mb-3" placeholder="Location">

<button class="btn btn-primary w-100" onclick="saveExam()">
Save Exam
</button>

</div>

</div>

</div>



<!-- PROFILE MODAL -->
<div class="modal fade" id="profileModal">

<div class="modal-dialog modal-dialog-centered">

<div class="modal-content profile-modal">

<div class="modal-header">

<h5 class="modal-title">Profile</h5>

<button type="button" class="btn-close" data-bs-dismiss="modal"></button>

</div>


<div class="modal-body text-center">

<div class="profile-avatar" id="profileAvatar">U</div>

<h5 id="profileUsername" class="mt-3"></h5>

<p id="profileEmail" class="text-muted"></p>

</div>


<div class="modal-footer">

<a href="/logout" class="btn btn-outline-danger">
Logout
</a>

</div>

</div>

</div>

</div>


<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<!-- Custom JS -->
<script src="js/exams.js"></script>

</body>
</html>
