<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tasks | Study to Success</title>

<!-- Bootstrap CSS -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Custom CSS -->
<link rel="stylesheet" href="css/task.css">
<link rel="stylesheet" href="css/theme.css">
</head>

<body id="body">

<div class="container-fluid">
  <div class="row min-vh-100">

    <!-- SIDEBAR -->
    <aside class="col-md-3 col-lg-2 sidebar p-4">
      <h4>Study to Success</h4>
      <p class="small text-light">Smart Study Planner</p>

      <ul class="nav flex-column mt-4">
       <a class="nav-link" href="dashboard.html">Dashboard</a>
<a class="nav-link active" href="task.html">Tasks</a>
<a class="nav-link" href="analytics.html">Analytics</a>
<a class="nav-link" href="exam.html">Exams</a>
<a class="nav-link" href="settings.html">Settings</a>

</ul>
    </aside>

    <!-- MAIN CONTENT -->
    <main class="col-md-9 col-lg-10 p-5 bg-light">

      <h2 class="mb-1">Study Tasks</h2>
      <p class="text-muted mb-4">Manage your assignments and study goals.</p>

      <div class="row">

        <!-- ADD TASK -->
        <div class="col-lg-4 mb-4">
          <div class="card shadow-sm">
            <div class="card-body">
              <h5 class="card-title mb-3">Add New Task</h5>

              <form id="add-task-form">
            <div class="mb-3">
  <label class="form-label">Task Name</label>
  <input type="text" id="taskName" class="form-control" placeholder="Enter task name">
</div>    
  <div class="mb-3">
  <label class="form-label">Subject</label>
  <select id="subjectSelect" class="form-select">
    <option value="">Select Subject</option>
  </select>
</div>

                <div class="mb-3">
                  <label class="form-label">Due Date</label>
                  <input type="date" id="dueDate" class="form-control">
                </div>

                <button class="btn btn-primary w-100" type="submit">
                  Add Task
                </button>
              </form>
            </div>
          </div>
        </div>

        <!-- TASK LIST -->
        <div class="col-lg-8">
          <div class="card shadow-sm">
            <div class="card-header bg-white">
              <h5 class="mb-0">Current Tasks</h5>
            </div>

            <div class="table-responsive">
              <table class="table table-bordered mb-0" id="tasks-table">
                <thead class="table-light">
  <tr>
    <th>Done</th>
    <th>Task</th>
    <th>Subject</th>
    <th>Due Date</th>
    <th>Status</th>
    <th>Action</th>

  </tr>
</thead>

               <tbody>
    <!-- Tasks will be added here by JS -->
  </tbody>

              </table>
            </div>
          </div>
        </div>

      </div>
    </main>

  </div>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<!-- Custom JS -->
<script src="js/task.js"></script>
</body>
</html>
